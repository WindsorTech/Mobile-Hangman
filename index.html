<!DOCTYPE html>
<html>
<head>
	<title>World Cities Hangman</title>

	<!-- CSS Stylesheet -->
	<link rel="stylesheet" type="text/css" href="assets/css/style-boot.css">

	<!-- Meta Tag Description -->
  	<meta name="description" content="Play this awesome Hangman game on your mobile device!">

	<!-- Mobile Viewport -->
  	<meta name="viewport" content="width=device-width, maximum-scale=1.0">
</head>

<body>

	<div class="container well">

		<div id="header">
		 	<h1>World Cities Hangman</h1>
		 	<div id="start-play"><h4>Press any letter to start playing!</h4></div>
		</div>

		<div class="card text-white bg-primary mb-3">

		<div id="home-world-city"><h3>What's the City?</h3>
		<div id="city"></div>
		<div id="news"></div>
		<div id="picture"></div>
		</div>

		</div>

		<div id="home-number-guesses">	
			<div class="card text-white bg-info mb-3">
			<h4>Wrong Guesses Left:</h4>
			<div id="guesses"></div>
			</div>
		</div>

		<div id="home-letters-guessed">	
			<div class="card text-white bg-warning mb-3">
			<h4>Letters Already Guessed:</h4>
			<div id="letters-guessed"></div>
			</div>
		</div>

		<div id="home-score" class="row">

			<div class="card text-white bg-success mb-3">	
			<h4 class="card-title">Wins:<div id="wins"></div></h4>
			</div>

			<div class="card text-white bg-danger mb-3">	
			<h4 class="card-title">Losses:<div id="losses"></div></h4>
			</div>
			
		</div>

	</div>

<script type="text/javascript" src="assets/javascript/game.js"></script>
</body>
</html>
